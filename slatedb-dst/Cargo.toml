[package]
name = "slatedb-dst"
description = "A deterministic simulation testing (DST) tool for SlateDB."
readme = "README.md"
version.workspace = true
edition.workspace = true
repository.workspace = true
license.workspace = true
homepage.workspace = true

[dependencies]
ctor = { workspace = true }
futures = { workspace = true }
object_store = { workspace = true }
rand = { workspace = true }
slatedb = { workspace = true, features = ["lz4", "snappy", "wal_disable", "zlib", "zstd"] }
tokio = { workspace = true, features = ["macros", "time", "test-util"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter"] }
tokio-util = { workspace = true, default-features = false }
