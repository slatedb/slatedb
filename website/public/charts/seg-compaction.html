const $=id=>document.getElementById(id);
const INK='#1f242b', GRID='var(--grid)', SOFT='#9aa1a9', MINOR='#eef0f2';

function niceNum(x){const e=Math.pow(10,Math.floor(Math.log10(x)));const f=x/e;
  for(const c of [1,1.5,2,2.5,3,4,5,7.5,10]) if(f<=c+1e-9) return c*e; return 10*e;}

// linear interpolation of y at data-x within a sorted [[x,y],...] series
function interp(xy,x){
  const n=xy.length;
  if(x<=xy[0][0]) return xy[0][1];
  if(x>=xy[n-1][0]) return xy[n-1][1];
  for(let i=1;i<n;i++){ if(x<=xy[i][0]){
    const [x0,y0]=xy[i-1],[x1,y1]=xy[i]; const t=(x-x0)/((x1-x0)||1);
    return y0+(y1-y0)*t; } }
  return xy[n-1][1];
}

function bindTip(el, htmlFn){
  el.addEventListener('mousemove',e=>{const t=$('tip');
    const h=htmlFn(e); if(h==null){t.style.opacity=0;return;}
    t.innerHTML=h; t.style.opacity=1;
    const pad=8, tw=t.offsetWidth, th=t.offsetHeight;
    let left=e.clientX+14; if(left+tw>innerWidth-pad) left=e.clientX-14-tw;
    left=Math.max(pad,Math.min(left,innerWidth-pad-tw));
    let top=Math.max(pad,Math.min(e.clientY-10,innerHeight-pad-th));
    t.style.left=left+'px'; t.style.top=top+'px';});
  el.addEventListener('mouseleave',()=>$('tip').style.opacity=0);
}

// swatches -----------------------------------------------------------------
function lineSwatch(dash,w){return `<svg width="22" height="12" viewBox="0 0 22 12" style="overflow:visible;vertical-align:-2px"><line x1="1" y1="6" x2="21" y2="6" stroke="#1f242b" stroke-width="${w||2.2}"${dash?' stroke-dasharray="4 3"':''}/></svg>`;}
function areaSwatch(kind){const W=18,H=12,fill=kind==='solid'?'#1f242b':'url(#hatch)';
  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="vertical-align:-2px"><rect x="0.5" y="0.5" width="${W-1}" height="${H-1}" fill="${fill}" stroke="#1f242b"/></svg>`;}

// generic chart -------------------------------------------------------------
// opts: {svgId, VH, MR, xlabel, ylabel, xmax, ymax, xfmt, yfmt, xtip, ytip,
//        series:[{xy, dash, width, fill:'solid'|'hatch'|null, label}], annot}
function chart(opts){
  const svg=$(opts.svgId);
  const VW=780, VH=opts.VH, ML=64, MR=opts.MR, MT=20, MB=52;
  const PW=VW-ML-MR, PH=VH-MT-MB;
  const ally=[].concat(...opts.series.map(s=>s.xy.map(p=>p[1])));
  const allx=[].concat(...opts.series.map(s=>s.xy.map(p=>p[0])));
  const xhi=opts.xmax!=null?opts.xmax:Math.max(...allx);
  const yraw=opts.ymax!=null?opts.ymax:Math.max(...ally);
  const ystep=niceNum(yraw*1.06/5);
  const yhi=Math.max(ystep, Math.ceil(yraw*1.02/ystep)*ystep);
  const xS=v=>ML+(v/xhi)*PW, yS=v=>MT+PH-(v/yhi)*PH, base=MT+PH;
  let g='';
  for(let v=0; v<=yhi+1e-9; v+=ystep){const y=yS(v);
    g+=`<line x1="${ML}" y1="${y}" x2="${ML+PW}" y2="${y}" stroke="${GRID}" stroke-dasharray="2 3"/>`;
    g+=`<text x="${ML-9}" y="${y+4}" text-anchor="end" font-size="11" fill="${SOFT}">${opts.yfmt(v)}</text>`;}
  const xstep=niceNum(xhi/6);
  for(let v=0; v<=xhi+1e-9; v+=xstep){const x=xS(v);
    g+=`<line x1="${x}" y1="${MT}" x2="${x}" y2="${base}" stroke="${MINOR}" stroke-dasharray="2 3"/>`;
    g+=`<text x="${x}" y="${base+16}" text-anchor="middle" font-size="11" fill="${SOFT}">${opts.xfmt(v)}</text>`;}
  g+=`<text transform="translate(15,${MT+PH/2}) rotate(-90)" text-anchor="middle" font-size="12" font-weight="700">${opts.ylabel}</text>`;
  g+=`<text x="${ML+PW/2}" y="${VH-4}" text-anchor="middle" font-size="12" font-weight="700">${opts.xlabel}</text>`;
  opts.series.forEach(s=>{
    const pts=s.xy.map((p,i)=>(i?'L':'M')+xS(p[0]).toFixed(1)+','+yS(p[1]).toFixed(1)).join(' ');
    if(s.fill){const fill=s.fill==='solid'?INK:'url(#hatch)';
      g+=`<path d="M${xS(s.xy[0][0]).toFixed(1)},${base} ${pts.slice(1)} L${xS(s.xy[s.xy.length-1][0]).toFixed(1)},${base} Z" fill="${fill}" stroke="none"/>`;}
    g+=`<path d="${pts}" fill="none" stroke="${INK}" stroke-width="${s.width}"${s.dash?' stroke-dasharray="4 3"':''}/>`;
  });
  (opts.annot||[]).forEach(a=>{
    g+=`<text x="${(xS(a.x)+(a.dx||0)).toFixed(1)}" y="${(yS(a.y)+(a.dy||0)).toFixed(1)}" font-size="11.5" font-weight="700" fill="${INK}"${a.anchor?` text-anchor="${a.anchor}"`:''}>${a.text}</text>`;});
  g+=`<g class="hov" style="display:none"><line stroke="${SOFT}" stroke-dasharray="3 3" y1="${MT}" y2="${base}"/><g class="dots"></g></g>`;
  g+=`<rect class="hit" x="${ML}" y="${MT}" width="${PW}" height="${PH}" fill="transparent"/>`;
  svg.innerHTML=g;

  const hov=svg.querySelector('.hov'), hline=hov.querySelector('line'), dots=hov.querySelector('.dots');
  const hit=svg.querySelector('.hit');
  hit.addEventListener('mouseenter',()=>hov.style.display='');
  hit.addEventListener('mouseleave',()=>{hov.style.display='none';});
  bindTip(hit, e=>{
    const r=svg.getBoundingClientRect();
    const vx=(e.clientX-r.left)/r.width*VW;
    let dx=(vx-ML)/PW*xhi; dx=Math.max(0,Math.min(xhi,dx));
    const gx=xS(dx);
    hline.setAttribute('x1',gx); hline.setAttribute('x2',gx);
    let d='', rows='';
    opts.series.forEach(s=>{const y=interp(s.xy,dx);
      d+=`<circle cx="${gx.toFixed(1)}" cy="${yS(y).toFixed(1)}" r="3.6" fill="#fff" stroke="${INK}" stroke-width="1.4"/>`;
      rows+=`${s.label}: <b>${opts.ytip(y)}</b><br>`;});
    dots.innerHTML=d;
    return `<b>${opts.xtip(dx)}</b><br>${rows}`;
  });
}

const UN={label:'unsegmented (size-tiered)'}, SE={label:'segmented (RFC-0024)'};
chart({svgId:'comp', VH:300, MR:20, xlabel:'elapsed (s)', ylabel:'compaction (MB/s, per 10s window)',
  xfmt:v=>v.toFixed(0), yfmt:v=>v.toFixed(0), xtip:v=>v.toFixed(0)+'s', ytip:v=>v.toFixed(0)+' MB/s',
  series:[
    {xy:DATA.u.comp, fill:'hatch', width:0.8, label:UN.label},
    {xy:DATA.s.comp, fill:'solid', width:0.8, label:SE.label},
  ]});
$('legComp').innerHTML =
  `<span class="item">${areaSwatch('solid')} segmented (RFC-0024)</span>`+
  `<span class="item">${areaSwatch('hatch')} unsegmented (size-tiered)</span>`;
</script>

<script>
/* report content height to the embedding page so an <iframe> can size itself */
(function(){
  var wrap=document.querySelector('.wrap');
  function postHeight(){var h=Math.ceil((wrap?wrap.offsetHeight:document.body.scrollHeight));
    parent.postMessage({chartHeight:h},'*');}
  window.addEventListener('load',postHeight);
  window.addEventListener('resize',postHeight);
  setTimeout(postHeight,250);
  if(window.ResizeObserver&&wrap){new ResizeObserver(postHeight).observe(wrap);}
})();
</script>
