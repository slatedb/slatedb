name: Publish Release (Node)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "The version of the release (e.g., 1.0.0)"
        required: true

permissions:
  contents: read

jobs:
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - name: Verify version
        uses: matt-usurp/validate-semver@v2
        with:
          version: ${{ github.event.inputs.version }}

  native-linux-gnu:
    name: Build native libraries (Linux GNU)
    runs-on: ubuntu-22.04
    needs: verify-version
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "v${{ github.event.inputs.version }}"

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross-compile toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Add Rust targets
        run: rustup target add x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu

      - name: Build x64 GNU library
        run: cargo build -p slatedb-uniffi --release --target x86_64-unknown-linux-gnu

      - name: Build arm64 GNU library
        env:
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CXX_aarch64_unknown_linux_gnu: aarch64-linux-gnu-g++
          AR_aarch64_unknown_linux_gnu: aarch64-linux-gnu-ar
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build -p slatedb-uniffi --release --target aarch64-unknown-linux-gnu

      - name: Stage Linux GNU native artifacts
        run: |
          mkdir -p artifacts/linux-x64-gnu artifacts/linux-arm64-gnu
          cp target/x86_64-unknown-linux-gnu/release/libslatedb_uniffi.so artifacts/linux-x64-gnu/
          cp target/aarch64-unknown-linux-gnu/release/libslatedb_uniffi.so artifacts/linux-arm64-gnu/

      - name: Upload Linux GNU native artifacts
        uses: actions/upload-artifact@v4
        with:
          name: node-native-linux-gnu
          path: artifacts

  native-linux-musl:
    name: Build native libraries (Linux musl)
    runs-on: ubuntu-22.04
    needs: verify-version
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "v${{ github.event.inputs.version }}"

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Add Rust targets
        run: rustup target add x86_64-unknown-linux-musl aarch64-unknown-linux-musl

      - name: Build x64 musl library
        run: cross build -p slatedb-uniffi --release --target x86_64-unknown-linux-musl

      - name: Build arm64 musl library
        run: cross build -p slatedb-uniffi --release --target aarch64-unknown-linux-musl

      - name: Stage Linux musl native artifacts
        run: |
          mkdir -p artifacts/linux-x64-musl artifacts/linux-arm64-musl
          cp target/x86_64-unknown-linux-musl/release/libslatedb_uniffi.so artifacts/linux-x64-musl/
          cp target/aarch64-unknown-linux-musl/release/libslatedb_uniffi.so artifacts/linux-arm64-musl/

      - name: Upload Linux musl native artifacts
        uses: actions/upload-artifact@v4
        with:
          name: node-native-linux-musl
          path: artifacts

  native-macos:
    name: Build native libraries (macOS)
    runs-on: macos-14
    needs: verify-version
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "v${{ github.event.inputs.version }}"

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust targets
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Build x64 macOS library
        run: cargo build -p slatedb-uniffi --release --target x86_64-apple-darwin

      - name: Build arm64 macOS library
        run: cargo build -p slatedb-uniffi --release --target aarch64-apple-darwin

      - name: Stage macOS native artifacts
        run: |
          mkdir -p artifacts/darwin-x64 artifacts/darwin-arm64
          cp target/x86_64-apple-darwin/release/libslatedb_uniffi.dylib artifacts/darwin-x64/
          cp target/aarch64-apple-darwin/release/libslatedb_uniffi.dylib artifacts/darwin-arm64/

      - name: Upload macOS native artifacts
        uses: actions/upload-artifact@v4
        with:
          name: node-native-macos
          path: artifacts

  native-windows:
    name: Build native libraries (Windows)
    runs-on: windows-latest
    needs: verify-version
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "v${{ github.event.inputs.version }}"

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust targets
        run: rustup target add x86_64-pc-windows-msvc aarch64-pc-windows-msvc

      - name: Build x64 Windows library
        run: cargo build -p slatedb-uniffi --release --target x86_64-pc-windows-msvc

      - name: Build arm64 Windows library
        run: cargo build -p slatedb-uniffi --release --target aarch64-pc-windows-msvc

      - name: Stage Windows native artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/win32-x64 | Out-Null
          New-Item -ItemType Directory -Force -Path artifacts/win32-arm64 | Out-Null
          Copy-Item target/x86_64-pc-windows-msvc/release/slatedb_uniffi.dll artifacts/win32-x64/
          Copy-Item target/aarch64-pc-windows-msvc/release/slatedb_uniffi.dll artifacts/win32-arm64/

      - name: Upload Windows native artifacts
        uses: actions/upload-artifact@v4
        with:
          name: node-native-windows
          path: artifacts

  publish-node:
    name: Publish Node to npm
    runs-on: ubuntu-latest
    needs: [native-linux-gnu, native-linux-musl, native-macos, native-windows]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "v${{ github.event.inputs.version }}"

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install uniffi-bindgen-node-js
        run: cargo install uniffi-bindgen-node-js --git https://github.com/criccomini/uniffi-bindgen-node-js.git --branch main --locked

      - name: Download Linux GNU artifacts
        uses: actions/download-artifact@v4
        with:
          name: node-native-linux-gnu
          path: native-libs/linux-gnu

      - name: Download Linux musl artifacts
        uses: actions/download-artifact@v4
        with:
          name: node-native-linux-musl
          path: native-libs/linux-musl

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: node-native-macos
          path: native-libs/macos

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: node-native-windows
          path: native-libs/windows

      - name: Generate Node package
        run: ./scripts/generate-node-package.sh --out-dir "${{ runner.temp }}/slatedb-node" --version "${{ github.event.inputs.version }}" --release

      - name: Stage bundled prebuilds
        shell: bash
        run: |
          package_dir="${{ runner.temp }}/slatedb-node"
          while IFS= read -r library_path; do
            target_id="$(basename "$(dirname "${library_path}")")"
            ./scripts/stage-node-prebuild.sh "${package_dir}" "${target_id}" "${library_path}"
          done < <(find native-libs -type f \( -name '*.so' -o -name '*.dylib' -o -name '*.dll' \) | sort)

      - name: Verify Node package layout
        shell: bash
        run: |
          package_dir="${{ runner.temp }}/slatedb-node"
          test -f "${package_dir}/package.json"
          test -f "${package_dir}/README.md"
          test -f "${package_dir}/LICENSE"
          test -f "${package_dir}/prebuilds/darwin-x64/libslatedb_uniffi.dylib"
          test -f "${package_dir}/prebuilds/darwin-arm64/libslatedb_uniffi.dylib"
          test -f "${package_dir}/prebuilds/linux-x64-gnu/libslatedb_uniffi.so"
          test -f "${package_dir}/prebuilds/linux-arm64-gnu/libslatedb_uniffi.so"
          test -f "${package_dir}/prebuilds/linux-x64-musl/libslatedb_uniffi.so"
          test -f "${package_dir}/prebuilds/linux-arm64-musl/libslatedb_uniffi.so"
          test -f "${package_dir}/prebuilds/win32-x64/slatedb_uniffi.dll"
          test -f "${package_dir}/prebuilds/win32-arm64/slatedb_uniffi.dll"

      - name: Pack npm package
        env:
          NPM_CONFIG_CACHE: ${{ runner.temp }}/npm-cache
        shell: bash
        run: |
          cd "${{ runner.temp }}/slatedb-node"
          npm pack

      - name: Publish to npm
        env:
          NPM_CONFIG_CACHE: ${{ runner.temp }}/npm-cache
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          cd "${{ runner.temp }}/slatedb-node"
          npm publish --access public
